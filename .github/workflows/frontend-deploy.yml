name: Frontend Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - '.github/workflows/frontend-deploy.yml'

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    env:
      TERRAGRUNT_NON_INTERACTIVE: "true"
      VITE_USE_MOCK_DATA: ${{ vars.VITE_USE_MOCK_DATA || 'false' }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate frontend API env configuration
        run: |
          echo "VITE_USE_MOCK_DATA=${VITE_USE_MOCK_DATA}"
          if [ "${VITE_USE_MOCK_DATA}" != "true" ] && [ -z "${VITE_API_BASE_URL}" ]; then
            echo "::error::VITE_API_BASE_URL is required when VITE_USE_MOCK_DATA is not 'true'. Set repository variable VITE_API_BASE_URL."
            exit 1
          fi

      - name: Build frontend
        env:
          VITE_USE_MOCK_DATA: ${{ env.VITE_USE_MOCK_DATA }}
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-frontend-deploy
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          TERRAGRUNT_VERSION=0.96.1
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Resolve deployment targets
        id: targets
        working-directory: terraform/environments/prod/cloudfront
        run: |
          BUCKET_NAME=$(terragrunt output -raw bucket_name)
          DISTRIBUTION_ID=$(terragrunt output -raw cloudfront_distribution_id)
          CLOUDFRONT_URL=$(terragrunt output -raw cloudfront_url)

          echo "bucket_name=${BUCKET_NAME}" >> "$GITHUB_OUTPUT"
          echo "distribution_id=${DISTRIBUTION_ID}" >> "$GITHUB_OUTPUT"
          echo "cloudfront_url=${CLOUDFRONT_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload static assets (long cache)
        run: |
          aws s3 sync dist/ "s3://${{ steps.targets.outputs.bucket_name }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp dist/index.html "s3://${{ steps.targets.outputs.bucket_name }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.targets.outputs.distribution_id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "invalidation_id=${INVALIDATION_ID}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Frontend Deploy Results"
            echo ""
            echo "- **S3 Bucket**: \`${{ steps.targets.outputs.bucket_name }}\`"
            echo "- **CloudFront Distribution**: \`${{ steps.targets.outputs.distribution_id }}\`"
            echo "- **Invalidation ID**: \`${{ steps.invalidate.outputs.invalidation_id }}\`"
            echo "- **URL**: ${{ steps.targets.outputs.cloudfront_url }}"
            echo "- **Commit**: \`${GITHUB_SHA:0:7}\`"
            echo ""
            echo "CloudFront invalidation runs asynchronously. If needed, verify completion in AWS Console."
          } >> "$GITHUB_STEP_SUMMARY"