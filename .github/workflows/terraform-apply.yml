name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ対象の環境'
        required: true
        type: choice
        options:
          - all
          - dynamodb
          - lambda-api
          - lambda-poller
          - cloudfront
        default: all
      dry_run:
        description: 'Dry run (plan のみ、apply しない)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # Required for AWS OIDC authentication

jobs:
  terraform-apply:
    name: Terraform Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    env:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      SWITCHBOT_DEVICE_ID: ${{ secrets.SWITCHBOT_DEVICE_ID }}
      TERRAGRUNT_NON_INTERACTIVE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-terraform-apply
          aws-region: ap-northeast-1

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          TERRAGRUNT_VERSION=0.96.1
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Plan (run-all)
        if: inputs.environment == 'all'
        working-directory: terraform/environments/prod
        run: |
          terragrunt run --all -- plan \
            -lock-timeout=5m \
            -no-color

      - name: Plan (single)
        if: inputs.environment != 'all'
        working-directory: terraform/environments/prod/${{ inputs.environment }}
        run: |
          terragrunt plan \
            -lock-timeout=5m \
            -no-color

      - name: Apply (run-all)
        if: inputs.environment == 'all' && inputs.dry_run == false
        working-directory: terraform/environments/prod
        run: |
          terragrunt run --all -- apply \
            -lock-timeout=5m \
            -no-color \
            -auto-approve

      - name: Apply (single)
        if: inputs.environment != 'all' && inputs.dry_run == false
        working-directory: terraform/environments/prod/${{ inputs.environment }}
        run: |
          terragrunt apply \
            -lock-timeout=5m \
            -no-color \
            -auto-approve

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Terraform Apply Results"
            echo ""
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "> **Dry run** - plan のみ実行（apply はスキップ）"
              echo ""
            fi
            echo "- **Environment**: \`${{ inputs.environment }}\`"
            echo "- **Dry run**: \`${{ inputs.dry_run }}\`"
            echo "- **Triggered by**: ${{ github.actor }}"
          } >> $GITHUB_STEP_SUMMARY
