name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ対象の環境'
        required: true
        type: choice
        options:
          - all
          - dynamodb
          - lambda-api
          - cloudfront
        default: all
      dry_run:
        description: 'Dry run (plan のみ、apply しない)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # AWS OIDC 認証に必要

jobs:
  terraform-apply:
    name: Terraform Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    env:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      SWITCHBOT_DEVICE_ID: ${{ secrets.SWITCHBOT_DEVICE_ID }}
      API_KEY: ${{ secrets.API_KEY }}
      TERRAGRUNT_NON_INTERACTIVE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-terraform-apply
          aws-region: ap-northeast-1

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          TERRAGRUNT_VERSION=0.96.1
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      # ===== Plan ステップ（dry_run / apply 両方で実行）=====

      - name: Plan (run-all)
        if: inputs.environment == 'all'
        working-directory: terraform/environments/prod
        run: |
          terragrunt run --all -- plan \
            -lock-timeout=5m \
            -no-color

      - name: Plan (single)
        if: inputs.environment != 'all'
        working-directory: terraform/environments/prod/${{ inputs.environment }}
        run: |
          terragrunt plan \
            -lock-timeout=5m \
            -no-color

      # ===== Apply フェーズ 1: ECR リポジトリ先行作成 =====
      # Lambda コンテナイメージが存在しない状態で Lambda を apply しようとすると
      # 失敗するため、ECR リポジトリを先に作成し、その後 Docker イメージをプッシュしてから
      # Lambda を含む全リソースを apply する

      - name: Apply Phase 1 - Create ECR repository (lambda-api)
        if: (inputs.environment == 'all' || inputs.environment == 'lambda-api') && inputs.dry_run == false
        working-directory: terraform/environments/prod/lambda-api
        run: |
          # -target で ECR リポジトリのみを先行作成
          # Lambda 本体は後続の apply ステップ（Phase 2 または Full lambda-api）で作成される
          terragrunt apply \
            -lock-timeout=5m \
            -no-color \
            -auto-approve \
            -target=aws_ecr_repository.this[0]

      # ===== Docker ビルド・ECR プッシュ =====

      - name: Build and push Docker image (lambda-api)
        if: (inputs.environment == 'all' || inputs.environment == 'lambda-api') && inputs.dry_run == false
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com
          ECR_REPOSITORY: smarthome-sensor-api
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          # "sha-" (4文字) + commit hash 7文字 = 11文字
          SHORT_TAG=${IMAGE_TAG:0:11}

          # ECR にログイン
          aws ecr get-login-password --region ap-northeast-1 | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"

          # Docker イメージビルド（linux/amd64 を明示指定: Lambda の実行環境は x86_64）
          docker build \
            --platform linux/amd64 \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${SHORT_TAG}" \
            lambda/api/

          # ECR へプッシュ（latest: 常に最新イメージを示す）
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          # ECR へプッシュ（sha-XXXXXXX: git コミットと紐付いたイメージ追跡用）
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${SHORT_TAG}"

          echo "Pushed: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "Pushed: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${SHORT_TAG}"

      # ===== Apply フェーズ 2: 全リソース apply =====

      - name: Apply Phase 2 - All environments
        if: inputs.environment == 'all' && inputs.dry_run == false
        working-directory: terraform/environments/prod
        run: |
          terragrunt run --all -- apply \
            -lock-timeout=5m \
            -no-color \
            -auto-approve

      - name: Apply - Full lambda-api
        if: inputs.environment == 'lambda-api' && inputs.dry_run == false
        working-directory: terraform/environments/prod/lambda-api
        run: |
          terragrunt apply \
            -lock-timeout=5m \
            -no-color \
            -auto-approve

      # lambda-api 以外の個別 apply（Docker ビルド不要な環境）
      - name: Apply (single)
        if: inputs.environment != 'all' && inputs.environment != 'lambda-api' && inputs.dry_run == false
        working-directory: terraform/environments/prod/${{ inputs.environment }}
        run: |
          terragrunt apply \
            -lock-timeout=5m \
            -no-color \
            -auto-approve

      # ===== Summary =====

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Terraform Apply Results"
            echo ""
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "> **Dry run** - plan のみ実行（apply はスキップ）"
              echo ""
            fi
            echo "- **Environment**: \`${{ inputs.environment }}\`"
            echo "- **Dry run**: \`${{ inputs.dry_run }}\`"
            echo "- **Triggered by**: ${{ github.actor }}"
            echo "- **Commit**: \`${GITHUB_SHA:0:7}\`"
            echo ""
            ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com"
            if [[ "${{ inputs.dry_run }}" == "false" ]] && \
               [[ "${{ inputs.environment }}" == "all" || \
                  "${{ inputs.environment }}" == "lambda-api" ]]; then
              echo "### Docker Image (lambda-api)"
              echo "- **Registry**: \`${ECR_REGISTRY}/smarthome-sensor-api\`"
              echo "- **Image tag**: \`sha-${GITHUB_SHA:0:7}\`"
            fi
          } >> $GITHUB_STEP_SUMMARY
